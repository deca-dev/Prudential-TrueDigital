<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link data-testid="favicon" id="favicon" rel="icon" href="https://pbs.twimg.com/profile_images/1348997011517927425/KHp1BMdw_400x400.jpg">
    <title>Prudential - Login</title>
    <style>
        :root {
            --brand-blue: #005d8f;
            --text-muted: #5e6d82 --input-border: #d9d9d9;
            --panel-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            background: #fff;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
        }

        .page {
            position: relative;
            min-height: 100vh;
            width: 100%;
            background-image:
                linear-gradient(to bottom, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.32)),
                url('./assets/business.jpeg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        .topbar {
            position: relative;
            z-index: 2;
            height: 71px;
            width: 100%;
            background: var(--brand-blue);
            display: flex;
            align-items: center;
            padding: 0 0 0 12px;
            box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.1);
        }

        .topbar img {
            width: 138px;
            height: auto;
            display: block;
        }

        .login-card {
            position: absolute;
            top: 111px;
            left: 54%;
            transform: translateX(-3px);
            width: 480px;
            min-height: 457px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            box-shadow: var(--panel-shadow);
            padding: 17px 22px 16px;
            z-index: 3;
        }

        .main-login {
            padding: 32px 28px 0;;
        }

        .login-card h1 {
            margin: 0;
            font-size: 23px !important;
            line-height: 1.15;
            color: black;
            font-weight: 900;
            font-family: Open Sans, sans-serif;
        }

        .login-card .subtitle {
            margin: 7px 0 16px;
            font-size: 16px;
            line-height: 1.3;
            color: #333;
        }

        .field {
            margin-bottom: 11px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            height: calc(1.5em + 1.5rem + 2px);
            border: 1px solid #c0c9d5;
            border-radius: 2px;
            padding: 0 30px 0 11px;
            font-size: .9375rem;
            font-weight: 400;
            line-height: 1.5;
            color: #23282e;
            background: #fff;
            outline: none;
        }

        .input-wrap input:focus {
            border-color: #b8c8d2;
        }

        .eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: #777;
            user-select: none;
            pointer-events: none;
        }

        .btn {

            background-color: #07639D !important;
            outline-color: #07639D !important;
            border-color: #07639D !important;
            color: #ffffff;
            border-radius: 5px;
            border: 1px solid transparent;
            padding: .75rem 1.25rem;
            font-size: .9375rem;
            line-height: 1.5;
            cursor: pointer;
            text-align: center;
            vertical-align: middle;
            display: inline-block;
            text-decoration: none;

            /* margin-top: 2px;
            align-items: center;
            justify-content: center;
            min-width: 59px;
            height: 31px;


            font-weight: 700;

            */
        }

        .forgot {
            margin-top: 11px;
            font-size: 15px;
            line-height: 1.4;
            color: black;
        }

        .forgot a {
            display: inline-block;
            margin-top: 7px;
            color: #0070b3;
            text-decoration: none;
            font-weight: 400;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        @media (max-width: 1024px) {
            .page {
                background-position: 58% center;
            }

            .login-card {
                left: 58%;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow: auto;
            }

            .page {
                min-height: 100vh;
                background-position: center;
            }

            .login-card {
                position: relative;
                top: auto;
                left: auto;
                transform: none;
                margin: 40px auto 0;
                width: calc(100% - 32px);
                max-width: 340px;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header class="topbar">
            <img src="./assets/pru-logo.png" alt="Prudential" />
        </header>

        <section class="login-card" aria-label="Inicio de sesión">
            <div class="main-login">
                <h1>Bienvenido al Portal de Agentes</h1>
                <p class="subtitle">Por favor ingresa tus datos para poder acceder</p>
            </div>

            <div class="field">
                <label for="usuario">Ingrese su usuario</label>
                <div class="input-wrap">
                    <input id="usuario" name="usuario" type="text" />
                </div>
            </div>

            <div class="field">
                <label for="password">Ingrese su contraseña</label>
                <div class="input-wrap">
                    <input id="password" name="password" type="password" />
                    <span class="eye">◉</span>
                </div>
            </div>

            <a class="btn" href="dashboard.html">Ingresar</a>

            <div class="forgot">
                ¿Olvidaste tu contraseña?<br />
                <a href="#">Recupérala aquí</a>
            </div>
        </section>
    </main>

</body>

</html>
